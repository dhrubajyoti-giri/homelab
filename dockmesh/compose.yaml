services:
  dockmesh:
    build:
      context: ./dockmesh
      dockerfile: Dockerfile
    image: dockmesh:latest
    container_name: dockmesh
    restart: unless-stopped
    #ports:
    #  - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${VOLUME_PATH}:/var/lib
      # Timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - caddy


networks:
  caddy:
    external: true
