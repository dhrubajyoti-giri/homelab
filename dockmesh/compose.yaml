services:
  dockmesh:
    build:
      context: ./dockmesh
      dockerfile: Dockerfile
    image: dockmesh:latest
    container_name: dockmesh
    restart: unless-stopped
    user: "0:0"
    #ports:
    #  - "8080:8080"
    group_add:
      - "${DOCKER_SOCKET_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${VOLUME_PATH}/data:/app/data
      - ${VOLUME_PATH}/stacks:/app/stacks
      # Timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      DOCKMESH_BASE_URL: ${DOCKMESH_BASE_URL}
    networks:
      - caddy


networks:
  caddy:
    external: true
