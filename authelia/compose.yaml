services:
  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    user: "1000:1000"
    # ports:
    #   - "9091:9091"
    volumes:
      - ${VOLUME_PATH}:/config
      # Timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - caddy


networks:
  caddy:
    external: true
